name: Build AngeticEssence.exe

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "website/**"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyarmor pyyaml
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Run PyArmor obfuscation + PyInstaller build
        run: python build_exe.py

      - name: Verify executable
        run: |
          if (Test-Path dist/AngeticEssence.exe) {
            $size = (Get-Item dist/AngeticEssence.exe).Length / 1MB
            Write-Host "AngeticEssence.exe built successfully ($('{0:N1}' -f $size) MB)"
          } else {
            Write-Error "Build failed — executable not found"
            exit 1
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AngeticEssence-${{ github.sha }}
          path: dist/AngeticEssence.exe
          retention-days: 30

      - name: Create release tag
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        id: tag
        run: |
          $tag = "v$(Get-Date -Format 'yyyy.MM.dd.HHmm')"
          echo "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Angetic Essence ${{ steps.tag.outputs.tag }}"
          body: |
            ## Angetic Essence — Automated Build

            - **Commit:** ${{ github.sha }}
            - **Build:** ${{ github.run_number }}
            - **Date:** ${{ steps.tag.outputs.tag }}

            This release was automatically built by GitHub Actions on push to main.
            Download `AngeticEssence.exe` from the assets below.
          files: dist/AngeticEssence.exe
          generate_release_notes: false
