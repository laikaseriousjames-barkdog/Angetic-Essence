# Angetic Essence Configuration

sandbox:
  enabled: false
  # When true: file writes go to sandbox/, commands are read-only, Python blocks os/subprocess/socket
  # When false: full unrestricted access to system

llm:
  # Providers: local (GGUF via llama-server), openai, anthropic, google, openrouter
  provider: "openrouter"
  # For local: path to .gguf file
  # For remote: model name (e.g. gpt-4o-mini, claude-3-haiku, gemini-2.0-flash)
  model: "openrouter/free"
  device: "cpu"
  max_tokens: 4096
  temperature: 0.7
  # API keys set via environment variables or Settings tab:
  #   OPENAI_API_KEY, ANTHROPIC_API_KEY, GOOGLE_API_KEY, OPENROUTER_API_KEY

# NEW – explicit permissions per agent and a master sandbox mode
permissions:
  Knuth:
    shell_execution: true
    network_bridge: true
    file_system_write: true
  Lovelace:
    shell_execution: false
    network_bridge: true
    file_system_write: false
  Turing:
    shell_execution: false
    network_bridge: false
    file_system_write: false
sandbox_mode: false

license:
  # License key for commercial activation. Obtain from https://api.angeticessence.com
  key: ""
  # Validation server URL (override for self-hosted license servers)
  validation_url: "https://api.angeticessence.com/validate"

cost:
  # Maximum daily spend in USD for remote LLM providers
